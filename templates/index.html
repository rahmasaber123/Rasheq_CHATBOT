<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rasheqa — مساعد التغذية الذكي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/14.1.3/marked.min.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-main: #0d1117;
  --bg-header: rgba(13,17,23,0.88);
  --bg-input-area: #161b22;
  --bg-input: #1c2333;
  --bg-user: #2563eb;
  --border: rgba(255,255,255,0.06);
  --border-input: rgba(255,255,255,0.1);
  --border-focus: #538df8;
  --accent: #58a6ff;
  --text: #d1d5db;
  --text-bright: #f0f6fc;
  --text-muted: #8b949e;
  --success: #3fb950;
  --font: 'IBM Plex Sans Arabic', -apple-system, sans-serif;
}

html, body { height: 100%; }

body {
  font-family: var(--font);
  background: var(--bg-main);
  color: var(--text);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── Layout ─────────────────────────── */
.app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 820px;
  margin: 0 auto;
}

/* ── Header ─────────────────────────── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 24px;
  background: var(--bg-header);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 10;
}

.header-brand { display: flex; align-items: center; gap: 14px; }

.logo {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, #58a6ff, #a78bfa);
  border-radius: 12px;
  display: grid; place-items: center;
  font-size: 18px; font-weight: 800; color: #fff;
}

.brand-info h1 { font-size: 17px; font-weight: 700; color: var(--text-bright); }
.brand-info p {
  font-size: 12px; color: var(--text-muted); margin-top: 1px;
  display: flex; align-items: center; gap: 5px;
}

.online-dot {
  width: 6px; height: 6px; background: var(--success);
  border-radius: 50%; display: inline-block;
  box-shadow: 0 0 6px var(--success);
}

.btn-reset {
  padding: 7px 16px; border-radius: 10px;
  border: 1px solid var(--border-input); background: transparent;
  color: var(--text-muted); font-family: var(--font); font-size: 13px;
  cursor: pointer; transition: all 0.2s;
}
.btn-reset:hover { background: rgba(255,255,255,0.04); color: var(--text); }

/* ── Chat ───────────────────────────── */
.chat-area {
  flex: 1; overflow-y: auto;
  padding: 28px 24px 20px;
}

.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 10px; }

/* ── Messages ───────────────────────── */
.message {
  display: flex; gap: 14px;
  margin-bottom: 32px;
  animation: fadeUp 0.3s cubic-bezier(0.16,1,0.3,1);
}
.message.user { flex-direction: row-reverse; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.avatar {
  width: 32px; height: 32px; border-radius: 50%;
  display: grid; place-items: center;
  font-size: 13px; font-weight: 700; flex-shrink: 0; margin-top: 2px;
}
.message.bot .avatar { background: linear-gradient(135deg, #58a6ff, #a78bfa); color: #fff; }
.message.user .avatar { background: var(--bg-user); color: #fff; }

.bubble { max-width: 85%; line-height: 1.75; font-size: 15px; }

.message.user .bubble {
  background: var(--bg-user); color: #fff;
  padding: 12px 18px; border-radius: 18px; border-bottom-left-radius: 6px;
}

.message.bot .bubble { color: var(--text); padding: 2px 0; }

/* ══════════════════════════════════════
   MARKDOWN CONTENT — the key part
   ══════════════════════════════════════ */
.md > *:first-child { margin-top: 0 !important; }
.md > *:last-child { margin-bottom: 0 !important; }

.md p { margin: 0 0 14px 0; line-height: 1.8; }

.md h1, .md h2, .md h3, .md h4 {
  font-weight: 700; line-height: 1.4;
  margin: 22px 0 10px 0;
  padding-bottom: 6px;
}
.md h1 { font-size: 1.3em; color: var(--text-bright); }
.md h2 { font-size: 1.15em; color: var(--text-bright); }
.md h3 { font-size: 1.05em; color: var(--accent); border-bottom: 1px solid var(--border); }
.md h4 { font-size: 1em; color: var(--accent); }

.md > h1:first-child, .md > h2:first-child, .md > h3:first-child { margin-top: 0; }

.md strong { color: var(--text-bright); font-weight: 600; }

.md a { color: var(--accent); text-decoration: none; border-bottom: 1px solid rgba(88,166,255,0.25); }
.md a:hover { border-bottom-color: var(--accent); }

.md ul, .md ol {
  margin: 8px 0 16px 0;
  padding-inline-start: 22px;
}

.md li {
  margin-bottom: 8px;
  line-height: 1.75;
  padding-inline-start: 4px;
}

.md li::marker { color: var(--accent); }

.md hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

.md code {
  background: rgba(255,255,255,0.06); padding: 2px 7px;
  border-radius: 5px; font-size: 0.88em; color: var(--accent);
}

/* Rasheqa product link button */
.rasheqa-btn {
  display: inline-flex; align-items: center; gap: 8px;
  margin: 14px 0 6px 0; padding: 11px 24px;
  background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
  color: #fff !important; border: none; border-radius: 12px;
  font-size: 14px; font-weight: 600; font-family: var(--font);
  text-decoration: none !important;
  cursor: pointer; transition: all 0.25s;
  box-shadow: 0 4px 18px rgba(37,99,235,0.25);
}
.rasheqa-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 26px rgba(37,99,235,0.35);
}
.rasheqa-btn::before { content: "🛒"; font-size: 15px; }

/* ── Typing ─────────────────────────── */
.typing-row { display: flex; gap: 14px; margin-bottom: 28px; animation: fadeUp 0.3s; }

.typing-dots { display: flex; align-items: center; gap: 5px; padding: 10px 4px; }
.typing-dots span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent); opacity: 0.25;
  animation: dotBounce 1.4s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.15s; }
.typing-dots span:nth-child(3) { animation-delay: 0.3s; }

@keyframes dotBounce {
  0%,60%,100% { opacity: 0.25; transform: translateY(0); }
  30% { opacity: 1; transform: translateY(-5px); }
}

/* ── Input ──────────────────────────── */
.input-area {
  padding: 14px 24px 20px;
  background: var(--bg-input-area);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.input-box {
  display: flex; align-items: flex-end; gap: 10px;
  background: var(--bg-input);
  border: 1px solid var(--border-input);
  border-radius: 16px;
  padding: 6px 6px 6px 14px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.input-box:focus-within {
  border-color: var(--border-focus);
  box-shadow: 0 0 0 3px rgba(88,166,255,0.08);
}

#userInput {
  flex: 1; border: none; background: transparent;
  color: var(--text); font-family: var(--font); font-size: 15px;
  line-height: 1.5; padding: 10px 0; outline: none; resize: none;
  min-height: 24px; max-height: 150px;
}
#userInput::placeholder { color: var(--text-muted); }

.btn-send {
  width: 40px; height: 40px; border-radius: 12px; border: none;
  background: var(--bg-user); color: #fff; cursor: pointer;
  display: grid; place-items: center; flex-shrink: 0; transition: all 0.2s;
}
.btn-send:hover { background: #3b82f6; }
.btn-send:active { transform: scale(0.93); }
.btn-send:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-send svg { width: 18px; height: 18px; transform: rotate(180deg); }

.footer-text { text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 10px; opacity: 0.45; }

@media (max-width: 640px) {
  .header { padding: 12px 16px; }
  .chat-area { padding: 18px 14px; }
  .input-area { padding: 12px 14px 16px; }
  .bubble { max-width: 92%; font-size: 14px; }
  .message { gap: 10px; margin-bottom: 24px; }
}
</style>
</head>
<body>

<div class="app">
  <header class="header">
    <div class="header-brand">
      <div class="logo">ر</div>
      <div class="brand-info">
        <h1>Rasheqa</h1>
        <p><span class="online-dot"></span> مساعد التغذية الذكي</p>
      </div>
    </div>
    <button class="btn-reset" onclick="resetChat()">↺ محادثة جديدة</button>
  </header>

  <div class="chat-area" id="chatArea"></div>

  <div class="input-area">
    <div class="input-box">
      <textarea id="userInput" rows="1" placeholder="اكتب رسالتك هنا..."
        onkeydown="handleKey(event)" oninput="autoGrow(this)"></textarea>
      <button class="btn-send" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </button>
    </div>
    <div class="footer-text">Rasheqa Assistant · GPT-4o Mini</div>
  </div>
</div>

<script>
// ── State ──────────────────────────
let SID = "";
let busy = false;

// ── Marked config ──────────────────
marked.setOptions({ breaks: true, gfm: true, headerIds: false, mangle: false });

const ren = new marked.Renderer();
ren.link = function(token) {
  const href = token.href || '';
  const text = token.text || href;
  if (href.includes("rasheqa.shop")) {
    return `<a class="rasheqa-btn" href="${href}" target="_blank">${text}</a>`;
  }
  return `<a href="${href}" target="_blank" rel="noopener">${text}</a>`;
};
marked.use({ renderer: ren });

function md(text) {
  if (!text) return "";
  // ── Normalize text so marked.js can parse block elements ──
  // Add newline before headings (###) if missing
  text = text.replace(/([^\n])(#{1,4}\s)/g, '$1\n\n$2');
  // Add newline before list items (- item) if missing
  text = text.replace(/([^\n])(\n?- )/g, '$1\n$2');
  // Add newline before numbered list items
  text = text.replace(/([^\n])(\n?\d+\.\s)/g, '$1\n$2');
  // Ensure double newline before headings for proper parsing
  text = text.replace(/\n(#{1,4}\s)/g, '\n\n$1');
  // Turn bare rasheqa URLs into markdown links
  text = text.replace(/(?<!\]\()(?<!\()(https:\/\/rasheqa\.shop\/[^\s\)\]]+)/g, '[ابدأ البرنامج الآن]($1)');
  return marked.parse(text);
}

// ── Init ───────────────────────────
async function init() {
  try {
    const r = await fetch("/api/new-session", { method: "POST" });
    const d = await r.json();
    SID = d.session_id;
    botMsg(d.greeting);
  } catch { botMsg("⚠️ تعذر الاتصال. حدّث الصفحة."); }
}

// ── Send ───────────────────────────
async function sendMessage() {
  const el = document.getElementById("userInput");
  const txt = el.value.trim();
  if (!txt || busy) return;

  userMsg(txt);
  el.value = "";
  autoGrow(el);
  setBusy(true);

  const typ = showTyping();

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ session_id: SID, message: txt }),
    });
    typ.remove();

    const { mdEl } = makeBotBubble();
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = "", full = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split("\n");
      buf = lines.pop() || "";
      for (const ln of lines) {
        if (!ln.startsWith("data: ")) continue;
        const p = ln.slice(6);
        if (p.trim() === "[DONE]") continue;
        full += p;
        mdEl.innerHTML = md(full);
        scroll();
      }
    }
    mdEl.innerHTML = md(full);
    scroll();
  } catch {
    typ.remove();
    botMsg("⚠️ خطأ في الاتصال. حاول مرة أخرى.");
  }
  setBusy(false);
}

// ── Reset ──────────────────────────
async function resetChat() {
  document.getElementById("chatArea").innerHTML = "";
  try {
    const r = await fetch("/api/reset", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ session_id: SID }),
    });
    const d = await r.json();
    SID = d.session_id;
    botMsg(d.greeting);
  } catch { botMsg("⚠️ تعذر إعادة التعيين."); }
}

// ── DOM ────────────────────────────
function userMsg(text) {
  const area = document.getElementById("chatArea");
  const row = document.createElement("div");
  row.className = "message user";
  row.innerHTML = `<div class="avatar">👤</div><div class="bubble">${esc(text)}</div>`;
  area.appendChild(row);
  scroll();
}

function botMsg(text) {
  const { mdEl } = makeBotBubble();
  mdEl.innerHTML = md(text);
  scroll();
}

function makeBotBubble() {
  const area = document.getElementById("chatArea");
  const row = document.createElement("div");
  row.className = "message bot";

  const av = document.createElement("div");
  av.className = "avatar";
  av.textContent = "ر";

  const bub = document.createElement("div");
  bub.className = "bubble";

  const mdEl = document.createElement("div");
  mdEl.className = "md";

  bub.appendChild(mdEl);
  row.appendChild(av);
  row.appendChild(bub);
  area.appendChild(row);
  return { row, mdEl };
}

function showTyping() {
  const area = document.getElementById("chatArea");
  const el = document.createElement("div");
  el.className = "typing-row";
  el.innerHTML = `
    <div class="avatar" style="background:linear-gradient(135deg,#58a6ff,#a78bfa);color:#fff;width:32px;height:32px;border-radius:50%;display:grid;place-items:center;font-size:13px;font-weight:700">ر</div>
    <div class="typing-dots"><span></span><span></span><span></span></div>`;
  area.appendChild(el);
  scroll();
  return el;
}

function scroll() {
  const a = document.getElementById("chatArea");
  a.scrollTop = a.scrollHeight;
}

function setBusy(v) {
  busy = v;
  document.getElementById("sendBtn").disabled = v;
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoGrow(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 150) + "px";
}

function esc(t) {
  const d = document.createElement("div");
  d.textContent = t;
  return d.innerHTML;
}

document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
